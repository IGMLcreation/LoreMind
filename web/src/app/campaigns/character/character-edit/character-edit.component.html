<div class="ce-page">

  <div class="ce-header">
    <button class="btn-back" (click)="back()">
      <lucide-icon [img]="ArrowLeft" [size]="14"></lucide-icon>
      Retour à la campagne
    </button>
    <div class="header-row">
      <h1>
        <lucide-icon [img]="User" [size]="22"></lucide-icon>
        {{ characterId ? 'Éditer la fiche' : 'Nouveau personnage' }}
      </h1>
      <button
        *ngIf="characterId"
        type="button"
        class="btn-ai"
        (click)="toggleChat()"
        [class.active]="chatOpen"
        title="Ouvrir l'Assistant IA pour dialoguer autour de ce PJ">
        <lucide-icon [img]="Sparkles" [size]="14"></lucide-icon>
        Assistant IA
      </button>
    </div>
  </div>

  <div class="ce-form">

    <div class="field">
      <label>Nom du personnage *</label>
      <input
        type="text"
        [(ngModel)]="name"
        name="name"
        placeholder="Ex: Thorin le Grand-Hache, Lyra l'Errante..."
      />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Portrait (ID image)</label>
        <input
          type="text"
          [(ngModel)]="portraitImageId"
          name="portraitImageId"
          placeholder="ID de l'image portrait"
        />
      </div>
      <div class="field">
        <label>Bandeau / Header (ID image)</label>
        <input
          type="text"
          [(ngModel)]="headerImageId"
          name="headerImageId"
          placeholder="ID de l'image bandeau"
        />
      </div>
    </div>
    <p class="hint">
      Les portraits et bandeaux acceptent un ID d'image (MVP). Picker visuel a venir.
    </p>

    <div class="template-fields">
      <app-dynamic-fields-form
        [fields]="templateFields"
        [values]="values"
        [imageValues]="imageValues"
        (valuesChange)="values = $event"
        (imageValuesChange)="imageValues = $event">
      </app-dynamic-fields-form>
    </div>

    <div class="actions">
      <button type="button" class="btn-primary" [disabled]="!name.trim()" (click)="submit()">
        <lucide-icon [img]="Save" [size]="16"></lucide-icon>
        {{ characterId ? 'Enregistrer' : 'Créer' }}
      </button>
      <button type="button" class="btn-secondary" (click)="back()">Annuler</button>
      <span class="spacer"></span>
      <button
        *ngIf="characterId"
        type="button"
        class="btn-danger"
        (click)="deleteCharacter()">
        <lucide-icon [img]="Trash2" [size]="14"></lucide-icon>
        Supprimer
      </button>
    </div>

  </div>

</div>

<app-ai-chat-drawer
  *ngIf="characterId && campaignId"
  [campaignId]="campaignId"
  entityType="character"
  [entityId]="characterId"
  [isOpen]="chatOpen"
  welcomeMessage="Je vois cette fiche de personnage. Demande-moi de proposer stats, backstory, équipement ou objectifs personnels."
  [quickSuggestions]="chatQuickSuggestions"
  (close)="chatOpen = false">
</app-ai-chat-drawer>
